# yaml-language-server: $schema=../../celilo/schemas/module-manifest.schema.json
celilo_contract: "1.0"
id: byoi
name: Build Your Own Internet
version: 0.1.1
description: Static Astro documentation site for Build Your Own Internet, served via Caddy.

# byoi serves its own content (provides no capability), so the payload version is
# authored via changesets, not a manual number. `celilo module version` consumes
# .changeset/*.md to stamp `version:` above at release; `celilo module check`
# fails on un-applied changesets. See MODULE_VERSIONING.md / ISS-0151.
version_source:
  kind: changeset

requires:
  capabilities:
    - name: public_web
      version: 3.1.0
    - name: dns_registrar
      version: 4.0.0

# idp is optional: Phase 1 (byoi-deploy) runs without Authentik; the
# on_install hook guards it (scripts/publish.ts declares it optional too).
optional:
  capabilities:
    - name: idp
      version: 1.2.0

variables:
  owns:
    - name: domain
      type: string
      required: true
      source: user
      description: "Public domain this site serves on (must be a caddy hostname)."
  imports: []

secrets:
  declares:
    - name: admin_password
      type: string
      required: true
      generate:
        method: random
        length: 24
        encoding: base64

build:
  # Packaging stages the module (celilo/) to a temp dir, so the repo-root
  # web/ sibling is only reachable via $CELILO_MODULE_SOURCE_DIR. Build it
  # in place, then copy dist into the staged module so it ships in the
  # netapp (where scripts/publish.ts reads it as <module>/web/dist).
  command: "(cd \"$CELILO_MODULE_SOURCE_DIR/../web\" && bun install && bun run build) && mkdir -p web && cp -R \"$CELILO_MODULE_SOURCE_DIR/../web/dist\" web/"
  artifacts:
    - web/dist/index.html

hooks:
  on_install:
    script: ./scripts/publish.ts
    timeout: 120000
  health_check:
    script: ./scripts/health-check.ts
    timeout: 60000

e2e:
  tests_dir: e2e
