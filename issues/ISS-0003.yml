title: Cross-chapter links reference old slugs
description: |
  After renaming chapter directories to match DECISION column, some markdown files still contain
  links to old slugs (e.g. /chapters/2.1-name-resolution-1-getting-started should be
  /chapters/2.1-basic-name-resolution). Link checker catches these as broken links.
  Need to grep and update all cross-chapter references in markdown files.
severity: high
type: bug
status: fixed
solution: |
  Updated all cross-chapter link references to use new slugs. Fixed glossary anchor links by
  removing "a.k.a" from headings. Updated appendix cross-references to use /chapters/ paths.
  Simplified headings with special characters that were causing slug mismatches.
