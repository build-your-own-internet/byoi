title: Links to non-rendered infrastructure files break validation
description: |
  Some chapters link to Dockerfiles, init scripts, and other infra files (./Dockerfile,
  ./init/start-up.sh, ./final/start-up.sh) that don't render as HTML pages. Link checker treats
  them as broken. Either exclude these from checking, render them as code pages, or document as
  expected-broken for hands-on lab content.
severity: low
type: bug
status: fixed
solution: |
  Updated link checker (web/scripts/check-links.ts) to skip infrastructure file links.
  Added patterns to skip: ./Dockerfile, ./docker-compose, ./init/, ./final/, ./exercise/,
  ../../bin/. These files are intentionally not part of the static site build and are only
  used when running the tutorial exercises locally.
