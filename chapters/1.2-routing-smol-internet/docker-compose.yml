version: "3.0"
services:
  router:
    build: .
    container_name: build-your-own-internet-router
    image: "build-your-own-internet-host"
    hostname: router
    networks:
      ten-one-net:
        ipv4_address: 10.1.1.3
      ten-two-net:
        ipv4_address: 10.1.2.3
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1

  client:
    image: "build-your-own-internet-host"
    container_name: build-your-own-internet-client
    hostname: client
    networks:
      ten-one-net:
        ipv4_address: 10.1.1.2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=0

  server:
    image: "build-your-own-internet-host"
    container_name: build-your-own-internet-server
    hostname: server
    networks:
      ten-two-net:
        ipv4_address: 10.1.2.2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=0

networks:
  ten-one-net:
    name: "build-your-own-internet-ten-one-net"
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.1.1.0/24
  ten-two-net:
    name: "build-your-own-internet-ten-two-net"
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.1.2.0/24
