version: "3.0"
services:
  client:
    build: .
    container_name: build-your-own-internet-client
    image: build-your-own-internet
    hostname: client
    networks:
      ten-dot-five-net:
        ipv4_address: 10.5.0.100
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=0
  server:
    container_name: build-your-own-internet-server
    image: build-your-own-internet
    hostname: server
    networks:
      ten-dot-one-net:
        ipv4_address: 10.1.0.100
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=0
  router1:
    container_name: build-your-own-internet-router1
    image: build-your-own-internet
    hostname: router1
    networks:
      ten-dot-five-net:
        ipv4_address: 10.5.1.1
      ten-dot-three-net:
        ipv4_address: 10.3.1.1
      p2p-eight:
        ipv4_address: 192.168.1.10
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
  router3:
    container_name: build-your-own-internet-router3
    image: build-your-own-internet
    hostname: router3
    networks:
      ten-dot-three-net:
        ipv4_address: 10.3.3.1
      oneseventytwo-net:
        ipv4_address: 172.16.3.1
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
  router2:
    container_name: build-your-own-internet-router2
    image: build-your-own-internet
    hostname: router2
    networks:
      oneseventytwo-net:
        ipv4_address: 172.16.2.1
      p2p-eight:
        ipv4_address: 192.168.1.11
      p2p-zero:
        ipv4_address: 192.168.1.2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
  router4:
    container_name: build-your-own-internet-router4
    image: build-your-own-internet
    hostname: router4
    networks:
      oneseventytwo-net:
        ipv4_address: 172.16.4.1
      p2p-sixteen:
        ipv4_address: 192.168.1.18
      p2p-zero:
        ipv4_address: 192.168.1.3
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
  router5:
    container_name: build-your-own-internet-router5
    image: build-your-own-internet
    hostname: router5
    networks:
      oneseventytwo-net:
        ipv4_address: 172.16.5.1
      p2p-sixteen:
        ipv4_address: 192.168.1.19
      ten-dot-one-net:
        ipv4_address: 10.1.5.1
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0

networks:
  ten-dot-five-net:
    name: build-your-own-internet-ten-dot-five-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 10.5.0.0/16
  ten-dot-three-net:
    name: build-your-own-internet-ten-dot-three-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 10.3.0.0/16
  ten-dot-one-net:
    name: build-your-own-internet-ten-dot-one-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 10.1.0.0/16
  oneseventytwo-net:
    name: build-your-own-internet-oneseventytwo-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 172.16.0.0/16
  p2p-eight:
    name: build-your-own-internet-p2p-eight
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.8/29
  p2p-zero:
    name: build-your-own-internet-p2p-zero
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.0/29
  p2p-sixteen:
    name: build-your-own-internet-p2p-sixteen
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: 'false'
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.16/29
