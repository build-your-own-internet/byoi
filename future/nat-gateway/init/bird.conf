# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  import none;
  export all;
}

# --- ADD THIS FILTER ---
filter ospf_export_filter {
  # Do NOT advertise this network into OSPF
  if net = 192.168.0.0/24 then reject;

  accept;
}

protocol ospf {
  # --- CHANGE THIS LINE ---
  export filter ospf_export_filter;   # was: export all;
  import all;

  area 0 {
    interface "*" {
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
  };
}