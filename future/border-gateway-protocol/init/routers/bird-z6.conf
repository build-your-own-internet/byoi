# BIRD Configuration for Router Z6 (AS200)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  # "import" takes routes from the machine's routing table
  # and then brings them into bird as static routes
  import none;

  # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
  # and propagates them into the machine's routing table
  export all;
}

# OSPF for internal AS200 networks (all non-1.0.0.0/8) and route redistribution
protocol ospf {
  # Export AS200 networks and BGP-learned routes (excluding 1.0.0.0/8)
  export where net !~ [ 1.0.0.0/8+ ] || source = RTS_BGP;
  import all;  # Accept all OSPF-learned routes

  area 0 {
    # Run OSPF on AS200 internal networks (exclude BGP peering link)
    interface "eth1" {  # two-five-six-net interface (2.5.6.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth2" {  # two-six-seven-net interface (2.6.7.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth3" {  # two-six-eight-net interface (2.6.8.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: Do NOT include eth0 (two-one-net) - that's for BGP peering only
  };
}

# BGP Configuration for AS200 peering with AS100
protocol bgp bgp_c3 {
  local as 200;
  neighbor 2.1.0.3 as 100;  # Router C3 in AS100

  # Export AS200 networks (everything except 1.0.0.0/8) - both direct and OSPF-learned
  export where net !~ [ 1.0.0.0/8+ ];

  # Import all routes from AS100
  import all;

  # BGP connection settings
  source address 2.1.0.6;  # Our IP on the peering link (eth0)
  next hop self;
}
