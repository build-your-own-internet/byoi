# BIRD Configuration for Router C3 (AS100)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  # "import" takes routes from the machine's routing table
  # and then brings them into bird as static routes
  import none;

  # "export" takes routes that BIRD has learned from other sources (e.g. RIP)
  # and propagates them into the machine's routing table
  export all;
}

# OSPF for internal AS100 networks (1.0.0.0/8) and route redistribution
protocol ospf {
  # Export AS100 direct routes and BGP-learned routes
  export where net ~ [ 1.0.0.0/8+ ] || source = RTS_BGP;
  import all;  # Accept all OSPF-learned routes

  area 0 {
    # Only run OSPF on AS100 internal networks
    interface "eth0" {  # one-one-net interface (1.1.0.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth1" {  # one-two-net interface (1.2.0.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: Do NOT include eth2 (two-one-net) - that's for BGP peering only
  };
}

# BGP Configuration for AS100 peering with AS200
protocol bgp bgp_z6 {
  local as 100;
  neighbor 2.1.0.6 as 200;  # Router Z6 in AS200

  # Export AS100 networks (1.0.0.0/8) - both direct and OSPF-learned
  export where net ~ [ 1.0.0.0/8+ ];

  # Import all routes from AS200
  import all;

  # BGP connection settings
  source address 2.1.0.3;  # Our IP on the peering link (eth2)
  next hop self;
}

