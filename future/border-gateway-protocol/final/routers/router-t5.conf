# BIRD Configuration for Router T5 (AS400 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  # "import" takes routes from the machine's routing table
  # and then brings them into bird as static routes
  import none;

  # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
  # and propagates them into the machine's routing table
  export all;
}

# OSPF for AS400 internal networks and route redistribution
protocol ospf {
  # Export AS400 networks (everything except 2.0.0.0/8) and BGP-learned routes
  export where net !~ [ 2.0.0.0/8+ ] || source = RTS_BGP;
  import all;  # Accept all OSPF-learned routes

  area 0 {
    # Internal AS400 networks only
    interface "eth1" {  # three-five-six-net (3.5.6.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth2" {  # three-five-seven-net (3.5.7.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth3" {  # three-five-eight-net (3.5.8.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: Do NOT include eth0 (two-three-net) - BGP peering with z7 only
  };
}

# BGP peering with AS200 (Zayo)
protocol bgp bgp_z7 {
  local as 400;
  neighbor 2.3.0.7 as 200;  # Router z7 in AS200
  source address 2.3.0.5;   # Our IP on peering link

  # Export AS400 networks (everything except 2.0.0.0/8)
  export where net !~ [ 2.0.0.0/8+ ];

  # Import all routes from AS200
  import all;
  next hop self;
}
