# BIRD Configuration for Router Z5 (AS200 - Internal)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  ipv4;
  interface "*";
}

protocol kernel {
  ipv4 {
    # "import" takes routes from the machine's routing table
    # and then brings them into bird as static routes
    import none;

    # "export" takes routes that BIRD has learned from other sources (e.g. OSPF)
    # and propagates them into the machine's routing table
    export all;
  };
}

# OSPF for AS200 internal networks (2.0.0.0/8)
protocol ospf v2 {
  ipv4 {
    # Export AS200 networks only
    export where net ~ [ 2.0.0.0/8+ ];
    import all;  # Accept all OSPF-learned routes
  };

  area 0 {
    # All interfaces are internal AS200 networks (renamed at startup)
    interface "n2-5-6" {  # 2.5.6.0/24 - to router-z6
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-5-7" {  # 2.5.7.0/24 - to router-z7
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-5-8" {  # 2.5.8.0/24 - to router-z8
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
  };
}
