# BIRD Configuration for Router C3 (AS400 - Internal)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  # "import" takes routes from the machine's routing table
  # and then brings them into bird as static routes
  import none;

  # "export" takes routes that BIRD has learned from other sources (e.g. OSPF)
  # and propagates them into the machine's routing table
  export all;
}

# OSPF for AS400 internal networks (everything except 2.0.0.0/8)
protocol ospf {
  # Export AS400 networks only
  export where net !~ [ 2.0.0.0/8+ ];
  import all;  # Accept all OSPF-learned routes

  area 0 {
    # All interfaces are now internal AS400 networks
    interface "eth0" {  # one-one-net interface (1.1.0.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth1" {  # one-two-net interface (1.2.0.0/24)
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth2" {  # two-one-net interface (2.1.0.0/24) - now internal to AS400
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
  };
}
