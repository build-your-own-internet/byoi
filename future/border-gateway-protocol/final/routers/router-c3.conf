# BIRD Configuration for Router C3 (AS100 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  ipv4;
  interface "*";
}

protocol kernel {
  ipv4 {
    # "import" takes routes from the machine's routing table
    # and then brings them into bird as static routes
    import none;

    # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
    # and propagates them into the machine's routing table
    export all;
  };
}

# OSPF for AS100 internal networks and route redistribution
protocol ospf v2 {
  ipv4 {
    # Accept all OSPF-learned routes from neighbors
    import all;

    # Export:
    # - AS100 networks (1.0.0.0/8)
    # - BGP-learned routes from AS200/AS400
    export where net ~ [ 1.0.0.0/8+ ] || source = RTS_BGP;
  };

  area 0 {
    # Internal AS100 networks (renamed at startup for deterministic naming)
    interface "n1-1" {  # 1.1.0.0/24 - to client-c1
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n1-2" {  # 1.2.0.0/24 - to router-c2/resolver-c
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: n2-1 (2.1.0.0/24 - to router-z6) is BGP peering only, NOT in OSPF
  };
}

# BGP peering with AS200 (Zayo)
protocol bgp bgp_z6 {
  local 2.1.0.3 as 100;
  neighbor 2.1.0.6 as 200;

  ipv4 {
    # Export AS100 networks (1.0.0.0/8)
    export where net ~ [ 1.0.0.0/8+ ];

    # Import all routes from AS200
    import all;
    next hop self;
  };
}
