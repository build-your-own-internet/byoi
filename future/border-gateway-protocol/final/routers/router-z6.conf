# BIRD Configuration for Router Z6 (AS200 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  ipv4;
  interface "*";
}

protocol kernel {
  ipv4 {
    # "import" takes routes from the machine's routing table
    # and then brings them into bird as static routes
    import none;

    # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
    # and propagates them into the machine's routing table
    export all;
  };
}

# OSPF for AS200 internal networks and route redistribution
protocol ospf v2 {
  ipv4 {
    import all;

    # Export ONLY AS200's internal infrastructure networks
    # iBGP handles external route distribution, not OSPF
    export where net ~ [ 2.0.0.0/8+ ];
  };

  area 0 {
    # Internal AS200 networks (renamed at startup for deterministic naming)
    interface "n2-5-6" {  # 2.5.6.0/24 - to router-z5
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-6-7" {  # 2.6.7.0/24 - to router-z7
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-6-8" {  # 2.6.8.0/24 - to router-z8
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: n2-1 (2.1.0.0/24 - to router-c3) is BGP peering only, NOT in OSPF
  };
}

# iBGP mesh within AS200
protocol bgp ibgp_z7 {
  local 2.6.7.6 as 200;
  neighbor 2.6.7.7 as 200;

  ipv4 {
    import all;
    export where source = RTS_BGP;
    next hop self;
  };
}

protocol bgp ibgp_z8 {
  local 2.6.8.6 as 200;
  neighbor 2.6.8.8 as 200;

  ipv4 {
    import all;
    export where source = RTS_BGP;
    next hop self;
  };
}

# BGP peering with AS100 (Comcast)
protocol bgp bgp_c3 {
  local 2.1.0.6 as 200;
  neighbor 2.1.0.3 as 100;

  ipv4 {
    # Export AS200 networks and routes learned via BGP (including iBGP)
    export where net ~ [ 2.0.0.0/8+ ] || source = RTS_BGP;

    import all;
    next hop self;
  };
}
