# BIRD Configuration for Router Z8 (AS200 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  ipv4;
  interface "*";
}

protocol kernel {
  ipv4 {
    # "import" takes routes from the machine's routing table
    # and then brings them into bird as static routes
    import none;

    # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
    # and propagates them into the machine's routing table
    export all;
  };
}

# OSPF for AS200 internal networks and route redistribution
protocol ospf v2 {
  ipv4 {
    # Export AS200 networks and BGP-learned routes
    export where net ~ [ 2.0.0.0/8+ ] || source = RTS_BGP;
    import all;  # Accept all OSPF-learned routes
  };

  area 0 {
    # Internal AS200 networks only (renamed at startup)
    interface "n2-5-8" {  # 2.5.8.0/24 - to router-z5
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-6-8" {  # 2.6.8.0/24 - to router-z6
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-7-8" {  # 2.7.8.0/24 - to router-z7
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: n2-8 is BGP peering only, NOT in OSPF
  };
}

# BGP peerings with AS400 routers

# BGP with router i2
protocol bgp bgp_i2 {
  local 2.8.0.8 as 200;
  neighbor 2.8.0.2 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}

# BGP with router g3
protocol bgp bgp_g3 {
  local 2.8.0.8 as 200;
  neighbor 2.8.0.3 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}

# BGP with router v4
protocol bgp bgp_v4 {
  local 2.8.0.8 as 200;
  neighbor 2.8.0.4 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}
