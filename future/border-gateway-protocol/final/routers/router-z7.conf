# BIRD Configuration for Router Z7 (AS200 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  ipv4;
  interface "*";
}

protocol kernel {
  ipv4 {
    # "import" takes routes from the machine's routing table
    # and then brings them into bird as static routes
    import none;

    # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
    # and propagates them into the machine's routing table
    export all;
  };
}

# OSPF for AS200 internal networks and route redistribution
protocol ospf v2 {
  ipv4 {
    import all;

    # Export ONLY AS200's internal infrastructure networks
    # iBGP handles external route distribution, not OSPF
    export where net ~ [ 2.0.0.0/8+ ];
  };

  area 0 {
    # Internal AS200 networks only (renamed at startup)
    interface "n2-5-7" {  # 2.5.7.0/24 - to router-z5
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-6-7" {  # 2.6.7.0/24 - to router-z6
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "n2-7-8" {  # 2.7.8.0/24 - to router-z8
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: n2-3 and n2-4 are BGP peering only, NOT in OSPF
  };
}

# iBGP mesh within AS200
protocol bgp ibgp_z6 {
  local 2.6.7.7 as 200;
  neighbor 2.6.7.6 as 200;

  ipv4 {
    import all;
    export where source = RTS_BGP;
    next hop self;
  };
}

protocol bgp ibgp_z8 {
  local 2.7.8.7 as 200;
  neighbor 2.7.8.8 as 200;

  ipv4 {
    import all;
    export where source = RTS_BGP;
    next hop self;
  };
}

# BGP peerings with AS400 routers

# BGP with router a4
protocol bgp bgp_a4 {
  local 2.4.0.7 as 200;
  neighbor 2.4.0.4 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}

# BGP with router n2
protocol bgp bgp_n2 {
  local 2.4.0.7 as 200;
  neighbor 2.4.0.2 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}

# BGP with router t5
protocol bgp bgp_t5 {
  local 2.3.0.7 as 200;
  neighbor 2.3.0.5 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}

# BGP with router t6
protocol bgp bgp_t6 {
  local 2.3.0.7 as 200;
  neighbor 2.3.0.6 as 400;

  ipv4 {
    export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
    import all;
    next hop self;
  };
}
