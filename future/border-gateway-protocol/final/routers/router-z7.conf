# BIRD Configuration for Router Z7 (AS200 - Border Router)
# If we run BIRD interactively, we can see logs go by for everything
# it's doing
debug protocols all;

# Learn what interfaces exist on this machine and also their up/down status
protocol device {
  scan time 10;
}

# Adds interface route information to BIRD's routing table
protocol direct {
  interface "*";
}

protocol kernel {
  # "import" takes routes from the machine's routing table
  # and then brings them into bird as static routes
  import none;

  # "export" takes routes that BIRD has learned from other sources (e.g. OSPF/BGP)
  # and propagates them into the machine's routing table
  export all;
}

# OSPF for AS200 internal networks and route redistribution
protocol ospf {
  # Export AS200 networks and BGP-learned routes
  export where net ~ [ 2.0.0.0/8+ ] || source = RTS_BGP;
  import all;  # Accept all OSPF-learned routes

  area 0 {
    # Only internal AS200 networks (exclude BGP peering links)
    interface "eth2" {  # two-five-seven-net (2.5.7.0/24) - to z5
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth3" {  # two-six-seven-net (2.6.7.0/24) - to z6
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    interface "eth4" {  # two-seven-eight-net (2.7.8.0/24) - to z8
      type broadcast;
      hello 10;
      wait 40;
      dead 40;
    };
    # Note: Do NOT include eth0 (two-three-net) and eth1 (two-four-net) - BGP peering only
  };
}

# BGP peerings with AS400 routers

# BGP with router a4
protocol bgp bgp_a4 {
  local as 200;
  neighbor 2.4.0.4 as 400;
  source address 2.4.0.7;
  export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
  import all;
  next hop self;
}

# BGP with router n2
protocol bgp bgp_n2 {
  local as 200;
  neighbor 2.4.0.2 as 400;
  source address 2.4.0.7;
  export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
  import all;
  next hop self;
}

# BGP with router t5
protocol bgp bgp_t5 {
  local as 200;
  neighbor 2.3.0.5 as 400;
  source address 2.3.0.7;
  export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
  import all;
  next hop self;
}

# BGP with router t6
protocol bgp bgp_t6 {
  local as 200;
  neighbor 2.3.0.6 as 400;
  source address 2.3.0.7;
  export where net ~ [ 2.0.0.0/8+ ];  # Export AS200 networks
  import all;
  next hop self;
}
